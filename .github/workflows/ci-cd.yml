name: CI/CD Pipeline

on:
  push:
    branches:
      - main 

env:
  HARBOR_REGISTRY: 210.90.24.172:8080
  HARBOR_PROJECT: camit
  STUDENT_ID: robot$myrobot
  IMAGE_NAME: resttemplateserver-sep

  # 별도 GitOps 저장소
  GITOPS_REPO: leeyoungkon/resttemplateserver-sep-gitops 
  GITOPS_PATH: overlays/dev 

jobs:
  build-and-push:
    name: Build & Push to Harbor
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

   

      - name: Generate image tag
        id: meta
        shell: powershell
        run: |
          "tag=${{ github.sha }}" >> $env:GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}            

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.STUDENT_ID }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.STUDENT_ID }}/${{ env.IMAGE_NAME }}:latest

  update-gitops:
    name: Update GitOps Repo for ArgoCD
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/    

      - name: Update image tag
        run: |
          cd gitops/${{ env.GITOPS_PATH }}

          kustomize edit set image \
            ${{ env.IMAGE_NAME }}=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/${{ env.STUDENT_ID }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Commit and push GitOps change
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --staged --quiet || git commit -m "ci: update ${{ env.IMAGE_NAME }} image to ${{ needs.build-and-push.outputs.image_tag }}"
          git push 